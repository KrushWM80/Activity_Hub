<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact Platform - Projects Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --walmart-blue: #0071CE;
            --walmart-yellow: #FFC220;
            --green: #107C10;
            --yellow: #F7630C;
            --red: #DC3545;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        .navbar {
            background: linear-gradient(135deg, var(--walmart-blue) 0%, #004C91 100%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 24px;
            color: white !important;
        }

        .navbar-brand i {
            margin-right: 10px;
            color: var(--walmart-yellow);
        }

        .container-main {
            max-width: 1400px;
            padding: 30px 0;
        }

        .metrics-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-box {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border-left: 5px solid var(--walmart-blue);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .metric-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.12);
        }

        .metric-box .number {
            font-size: 36px;
            font-weight: bold;
            color: var(--walmart-blue);
            margin-bottom: 5px;
        }

        .metric-box .label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filters-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .btn-primary {
            background: var(--walmart-blue) !important;
            border-color: var(--walmart-blue) !important;
        }

        .btn-primary:hover {
            background: #004C91 !important;
            border-color: #004C91 !important;
        }

        .btn-warning {
            background: var(--walmart-yellow) !important;
            border-color: var(--walmart-yellow) !important;
            color: #333 !important;
        }

        .table-container {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .table {
            margin: 0;
        }

        .table thead {
            background: linear-gradient(135deg, var(--walmart-blue) 0%, #004C91 100%);
            color: white;
        }

        .table tbody tr {
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .table tbody tr:hover {
            background: #f9f9f9;
        }

        .health-green {
            background: #d4edda;
            color: var(--green);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }

        .health-yellow {
            background: #fff3cd;
            color: #856404;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }

        .health-red {
            background: #f8d7da;
            color: var(--red);
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }

        .status-updated {
            background: #d4edda;
            color: var(--green);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-not-updated {
            background: #f8d7da;
            color: var(--red);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--walmart-blue) 0%, #004C91 100%);
            color: white;
        }

        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
        }

        .tab-button {
            background: white;
            border: 2px solid #ddd;
            color: #666;
            padding: 10px 20px;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            border-bottom: 3px solid #ddd;
        }

        .tab-button.active {
            background: linear-gradient(135deg, var(--walmart-blue) 0%, #004C91 100%);
            color: white;
            border-color: var(--walmart-blue);
            border-bottom: 3px solid var(--walmart-blue);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .loading i {
            font-size: 48px;
            color: var(--walmart-blue);
            margin-bottom: 20px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .header-section {
            margin-bottom: 40px;
            text-align: center;
        }

        .header-section h1 {
            color: var(--walmart-blue);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .header-section p {
            color: #666;
            font-size: 16px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: bold;
            color: var(--walmart-blue);
            margin-bottom: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .badge {
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-active {
            background: #d4edda;
            color: var(--green);
        }

        .badge-inactive {
            background: #e2e3e5;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-chart-line"></i>Impact Platform
            </span>
            <span style="color: white; font-size: 12px;">
                <i class="fas fa-circle" style="color: var(--walmart-yellow); margin-right: 5px;"></i>Active 
            </span>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-fluid container-main">
        <!-- Header -->
        <div class="header-section">
            <h1><i class="fas fa-project-diagram"></i> Projects Impact Dashboard</h1>
            <p>Monitor and manage all projects across your organization</p>
        </div>

        <!-- Metrics -->
        <div class="metrics-container">
            <div class="metric-box">
                <div class="number" id="metric-projects">0</div>
                <div class="label">Active Projects</div>
            </div>
            <div class="metric-box">
                <div class="number" id="metric-owners">0</div>
                <div class="label">Unique Owners</div>
            </div>
            <div class="metric-box">
                <div class="number" id="metric-updated">0</div>
                <div class="label">Updated This Week</div>
            </div>
            <div class="metric-box">
                <div class="number" id="metric-percent">0%</div>
                <div class="label">Percent Updated</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-container">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label"><strong>Business Area</strong></label>
                    <select class="form-select" id="filter-business-area">
                        <option value="">All Areas</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label"><strong>Health Status</strong></label>
                    <select class="form-select" id="filter-health">
                        <option value="">All Health Statuses</option>
                        <option value="Green">Green</option>
                        <option value="Yellow">Yellow</option>
                        <option value="Red">Red</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label"><strong>Status</strong></label>
                    <select class="form-select" id="filter-status">
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                        <option value="">All</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">&nbsp;</label>
                    <button class="btn btn-primary w-100" onclick="loadProjects()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons" style="margin-bottom: 30px;">
            <button class="btn btn-warning" onclick="generatePPT()">
                <i class="fas fa-file-powerpoint"></i> Generate PPT Report
            </button>
            <button class="btn btn-primary" onclick="showAddProjectModal()">
                <i class="fas fa-plus"></i> Add Project
            </button>
        </div>

        <!-- Projects Table -->
        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width: 25%;">Project Title</th>
                        <th style="width: 15%;">Business Area</th>
                        <th style="width: 12%;">Owner</th>
                        <th style="width: 10%;">Health</th>
                        <th style="width: 15%;">Latest Update</th>
                        <th style="width: 12%;">Week Status</th>
                        <th style="width: 11%;">Actions</th>
                    </tr>
                </thead>
                <tbody id="projects-table">
                    <tr>
                        <td colspan="7" class="loading">
                            <i class="fas fa-spinner"></i> Loading projects...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Project Modal -->
    <div class="modal fade" id="addProjectModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-plus"></i> Add New Project</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addProjectForm">
                        <div class="form-group">
                            <label>Project Title *</label>
                            <input type="text" class="form-control" id="form-title" required>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-control" id="form-description" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 form-group">
                                <label>Owner Name *</label>
                                <input type="text" class="form-control" id="form-owner-name" required>
                            </div>
                            <div class="col-md-6 form-group">
                                <label>Owner ID *</label>
                                <input type="text" class="form-control" id="form-owner-id" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 form-group">
                                <label>Business Area *</label>
                                <input type="text" class="form-control" id="form-business-area" required>
                            </div>
                            <div class="col-md-6 form-group">
                                <label>Health Status *</label>
                                <select class="form-select" id="form-health-status" required>
                                    <option value="">Select...</option>
                                    <option value="Green">Green</option>
                                    <option value="Yellow">Yellow</option>
                                    <option value="Red">Red</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="submitProjectForm()">Create Project</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
