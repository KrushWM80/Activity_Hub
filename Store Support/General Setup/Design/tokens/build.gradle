apply from: 'version.gradle'

buildscript {
    repositories {
        maven { url walmartProximityRepository }
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:4.2.2"
        classpath 'com.walmartlabs.android.gradle:multimodule-gradle-plugin:0.4.1'
        classpath 'org.hibernate.build.gradle:gradle-maven-publish-auth:2.0.1'
    }
}

allprojects {
    repositories {
        maven { url walmartProximityRepository }
        google()
        mavenCentral()
    }

    // Make 'publish..' tasks kick off a fresh release build before running
    tasks.whenTaskAdded { theTask ->
        if (theTask.name.startsWith('publish')) {
            println "Adding dependency on assembleRelease for task: " + theTask.name
            theTask.dependsOn "assembleRelease"
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}