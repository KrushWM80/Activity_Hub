        :root {

            --bg-section: rgba(255,255,255,0.05);
            --bg-card: rgba(0,0,0,0.2);
            --bg-week-column: linear-gradient(180deg, rgba(0,212,255,0.15) 0%, rgba(0,255,136,0.05) 100%);
            --bg-header-row: rgba(0,212,255,0.1);
            --bg-highlight: rgba(0, 212, 255, 0.1);
            --bg-format-week: rgba(255,255,255,0.05);
            --bg-growth-badge: rgba(0, 255, 136, 0.2);
            --bg-progress-bar: rgba(255,255,255,0.1);
            
            --text-primary: #fff;
            --text-secondary: rgba(255,255,255,0.8);
            --text-muted: rgba(255,255,255,0.7);
            --text-accent: #00d4ff;
            --text-success: #00ff88;
            
            --border-color: rgba(255,255,255,0.1);
            --border-accent: rgba(0, 212, 255, 0.3);
            
            --gradient-accent: linear-gradient(135deg, #00d4ff, #00ff88);
            --gradient-progress: linear-gradient(90deg, #00d4ff, #00ff88);
        }
        
        /* Light mode overrides */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
                --bg-section: rgba(255,255,255,0.95);
                --bg-card: rgba(0,0,0,0.03);
                --bg-week-column: linear-gradient(180deg, rgba(0,113,206,0.08) 0%, rgba(0,76,151,0.03) 100%);
                --bg-header-row: rgba(0,113,206,0.1);
                --bg-highlight: rgba(0, 113, 206, 0.08);
                --bg-format-week: rgba(0,0,0,0.03);
                --bg-growth-badge: rgba(0, 150, 64, 0.15);
                --bg-progress-bar: rgba(0,0,0,0.1);
                
                --text-primary: #1a1a2e;
                --text-secondary: #333;
                --text-muted: #666;
                --text-accent: #0071CE;
                --text-success: #009640;
                
                --border-color: rgba(0,0,0,0.1);
                --border-accent: rgba(0, 113, 206, 0.3);
                
                --gradient-accent: linear-gradient(135deg, #0071CE, #004C97);
                --gradient-progress: linear-gradient(90deg, #0071CE, #009640);
            }
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px;
            background: var(--bg-section);
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            font-size: 1.2rem;
            color: var(--text-muted);
        }
        
        .section {
            background: var(--bg-section);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-accent);
            color: var(--text-accent);
        }
        
        #trendChart {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        
        .week-column {
            background: var(--bg-week-column);
            border-radius: 12px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid var(--border-accent);
        }
        
        .week-column-header {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        
        .week-column-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        
        .trend-percent {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .week-metrics {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.75rem;
        }
        
        .metric-item {
            text-align: center;
        }
        
        .metric-item-value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .metric-item-label {
            font-size: 0.65rem;
            color: var(--text-muted);
        }
        
        .week-change {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid var(--border-color);
        }
        
        .change-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-success);
        }
        
        .change-label {
            font-size: 0.65rem;
            color: var(--text-muted);
        }
        
        /* Division comparison */
        .division-row {
            display: grid;
            grid-template-columns: 1.2fr repeat(8, 0.8fr);
            gap: 8px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            font-size: 0.85rem;
        }
        
        .division-row.header {
            font-weight: 600;
            background: var(--bg-header-row);
            padding: 12px 8px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .division-name {
            font-weight: 500;
            padding-left: 10px;
        }
        
        .division-value {
            text-align: center;
            font-size: 0.8rem;
        }
        
        .progress-bar {
            height: 4px;
            background: var(--bg-progress-bar);
            border-radius: 2px;
            margin-top: 4px;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--gradient-progress);
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        
        /* Format cards */
        #formatComparison {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .format-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .format-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-accent);
        }
        
        .format-stats {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .format-stat-row {
            padding: 10px;
            background: var(--bg-format-week);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .format-stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: left;
        }
        
        .format-stat-value {
            font-weight: 600;
            color: var(--text-success);
        }
        
        /* User Engagement Grid */
        #userEngagement {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        
        .engagement-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
        }
        
        .engagement-header {
            font-weight: 600;
            text-align: center;
            padding-bottom: 15px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-accent);
            font-size: 1.1rem;
        }
        
        .engagement-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        
        .engagement-metric {
            text-align: center;
            padding: 12px;
            background: var(--bg-highlight);
            border-radius: 8px;
        }
        
        .engagement-metric-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .growth-badge {
            background: var(--bg-growth-badge);
            color: var(--text-success);
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .engagement-metric-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-success);
        }
        
        /* Insights */
        .insights-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--text-accent);
        }
        
        .insight-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .insight-icon {
            color: var(--text-success);
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .insight-text {
            flex: 1;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        
        /* Responsive */
        @media (max-width: 1400px) {
            #trendChart {

            #formatComparison {

            }
            .division-row {

            }
        }

            }
            #formatComparison {

            }

            }
            .division-row {
                grid-template-columns: 1.4fr repeat(4, 1fr);

            }
        }

            #trendChart {

            }
            #formatComparison {

            }
            .week-metrics {

            }
            .division-row {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .division-row > div {
                padding: 5px 0;
            }
            .engagement-metrics {
                grid-template-columns: 1fr;
            }
        }
    </style>

                    userEngagement: {

                        managers: 65399,
                        totalUsers: 170777,
                        totalActions: 7445862
                    }
                },
                {
                    week: 8,
                    date: "2/28/26",
                    label: "Week 8",
                    summary: {
                        totalStores: 4460,
                        storesWithAssignments: 4460,
                        totalPossibleItems: 1426588,
                        totalAssignedItems: 1240922,
                        totalCompletedItems: 1117646,
                        overallCompletionOfMax: "78.3"
                    },
                    divisionStats: [
                        { divisionId: "SOUTHEAST BU", completionPercentage: 80.3 },
                        { divisionId: "NORTH BU", completionPercentage: 76.0 },
                        { divisionId: "SOUTHWEST BU", completionPercentage: 82.8 },
                        { divisionId: "WEST BU", completionPercentage: 78.5 },
                        { divisionId: "NHM BU", completionPercentage: 88.6 },
                        { divisionId: "EAST BU", completionPercentage: 74.7 },
                        { divisionId: "PR", completionPercentage: 112.9 }
                    ],
                    formatStats: [
                        { format: "SC", completionPercentage: 77.2 },
                        { format: "DIV1", completionPercentage: 73.5 },
                        { format: "NHM", completionPercentage: 88.7 }
                    ],
                    areaStats: [
                        { area: "ACC", completionPercentage: "87.2" },
                        { area: "Asset Protection", completionPercentage: "88.6" },
                        { area: "Backroom", completionPercentage: "77.2" },
                        { area: "Fashion", completionPercentage: "72.5" },
                        { area: "Fresh", completionPercentage: "84.9" },
                        { area: "Front End", completionPercentage: "84.0" },

                    ],
                    userEngagement: {
                        workers: 115000,
                        managers: 75000,
                        totalUsers: 190000,
                        totalActions: 2358568
                    }
                }
            ]
        };

        // Render main trend chart with all weeks
        function renderTrendChart() {
            const container = document.getElementById("trendChart");
            
            COMPARISON_DATA.weeks.forEach((week, index) => {
                const prevWeek = index > 0 ? COMPARISON_DATA.weeks[index - 1] : null;
                const completion = parseFloat(week.summary.overallCompletionOfMax);
                const prevCompletion = prevWeek ? parseFloat(prevWeek.summary.overallCompletionOfMax) : 0;
                const change = prevWeek ? (completion - prevCompletion).toFixed(1) : completion.toFixed(1);
                const isWeek1 = index === 0;
                
                const column = document.createElement("div");
                column.className = "week-column";
                
                let changeHTML = "";
                if (isWeek1) {
                    changeHTML = `<div class="week-change"><div class="change-value">+${change}%</div><div class="change-label">from 1/3/26</div></div>`;
                } else {
                    changeHTML = `<div class="week-change"><div class="change-value">${change >= 0 ? '+' : ''}${change}%</div><div class="change-label">vs Previous Week</div></div>`;
                }
                
                column.innerHTML = `
                    <div class="week-column-header">${week.label}</div>
                    <div class="week-column-date">${week.date}</div>
                    <div class="trend-percent">${week.summary.overallCompletionOfMax}%</div>
                    <div class="week-metrics">
                        <div class="metric-item">
                            <div class="metric-item-value">${(week.summary.totalCompletedItems / 1000).toFixed(0)}k</div>
                            <div class="metric-item-label">Completed</div>
                        </div>
                        <div class="metric-item">
                            <div class="metric-item-value">${(week.summary.storesWithAssignments / 1000).toFixed(1)}k</div>
                            <div class="metric-item-label">Stores Active</div>
                        </div>
                    </div>
                    ${changeHTML}
                `;
                
                container.appendChild(column);
            });
        }

        // Generate insights across all weeks
        function renderInsights() {
            const container = document.getElementById("insights");
            const weeks = COMPARISON_DATA.weeks;
            
            // Calculate week-by-week changes
            const changes = [];
            for (let i = 1; i < weeks.length; i++) {
                const change = (parseFloat(weeks[i].summary.overallCompletionOfMax) - parseFloat(weeks[i-1].summary.overallCompletionOfMax)).toFixed(1);
                changes.push({
                    week: i + 1,
                    change: change,
                    completion: weeks[i].summary.overallCompletionOfMax
                });
            }
            
            const itemsCompleted = weeks[7].summary.totalCompletedItems - weeks[0].summary.totalCompletedItems;
            const totalChange = (parseFloat(weeks[7].summary.overallCompletionOfMax) - parseFloat(weeks[0].summary.overallCompletionOfMax)).toFixed(1);
            
            const insights = [
                `<strong>8-Week Progress:</strong> Improved from ${weeks[0].summary.overallCompletionOfMax}% to ${weeks[7].summary.overallCompletionOfMax}% (+${totalChange}%)`,
                `<strong>Week 8 Achievement:</strong> Reached ${changes[6].completion}% completion (+${changes[6].change}% from Week 7)`,
                `<strong>Items Completed:</strong> ${itemsCompleted.toLocaleString()} additional items completed since Week 1`,
                `<strong>Store Participation:</strong> Week 8 has ${weeks[7].summary.storesWithAssignments.toLocaleString()} active stores (${(weeks[7].summary.storesWithAssignments/weeks[7].summary.totalStores*100).toFixed(1)}%)`,
                `<strong>Week 6 Milestone:</strong> Achieved ${weeks[5].summary.overallCompletionOfMax}% completion in Week 6`,
                `<strong>Consistent Growth:</strong> All 8 weeks show steady week-over-week improvement`
            ];
            
            let html = '<div class="insights-title">📈 Key Insights</div>';
            insights.forEach(insight => {
                html += `<div class="insight-item"><span class="insight-icon">✓</span><span class="insight-text">${insight}</span></div>`;
            });
            container.innerHTML = html;
        }

        // Render format comparison across all weeks
        function renderFormatComparison() {
            const container = document.getElementById("formatComparison");
            
            const formats = ["SC", "DIV1", "NHM"];
            
            formats.forEach(format => {
                const card = document.createElement("div");
                card.className = "format-card";
                
                let html = `<div class="format-name">${format}</div><div class="format-stats">`;
                
                COMPARISON_DATA.weeks.forEach(week => {
                    const formatData = week.formatStats.find(f => f.format === format);
                    html += `<div class="format-stat-row"><span class="format-stat-label">${week.label}</span><span class="format-stat-value">${formatData ? formatData.completionPercentage + "%" : "N/A"}</span></div>`;
                });
                
                html += `</div>`;
                card.innerHTML = html;
                container.appendChild(card);
            });
        }

        // Render division comparison across all weeks
        function renderDivisionComparison() {
            const container = document.getElementById("divisionComparison");
            
            // Get list of all divisions
            const divisions = new Set();
            COMPARISON_DATA.weeks.forEach(week => {
                week.divisionStats.forEach(div => divisions.add(div.divisionId));
            });
            
            // Header row
            let html = '<div class="division-row header"><div>Division</div>';
            COMPARISON_DATA.weeks.forEach(week => {
                html += `<div>${week.label}</div>`;
            });
            html += '</div>';
            
            // Data rows
            Array.from(divisions).sort().forEach(divisionId => {
                html += `<div class="division-row"><div class="division-name">${divisionId}</div>`;
                
                COMPARISON_DATA.weeks.forEach(week => {
                    const weekDiv = week.divisionStats.find(d => d.divisionId === divisionId);
                    const percent = weekDiv ? weekDiv.completionPercentage : 0;
                    html += `<div class="division-value">${weekDiv ? weekDiv.completionPercentage + "%" : "N/A"}<div class="progress-bar"><div class="progress-fill" style="width: ${percent > 100 ? 100 : percent}%"></div></div></div>`;
                });
                
                html += '</div>';
            });
            
            container.innerHTML = html;
        }

        // Render area comparison across all weeks
        function renderAreaComparison() {
            const container = document.getElementById("areaComparison");
            
            // Get list of all areas
            const areas = new Set();
            COMPARISON_DATA.weeks.forEach(week => {
                week.areaStats.forEach(area => areas.add(area.area));
            });
            
            // Header row
            let html = '<div class="division-row header"><div>Area</div>';
            COMPARISON_DATA.weeks.forEach(week => {
                html += `<div>${week.label}</div>`;
            });
            html += '</div>';
            
            // Data rows
            Array.from(areas).sort().forEach(areaName => {
                html += `<div class="division-row"><div class="division-name">${areaName}</div>`;
                
                COMPARISON_DATA.weeks.forEach(week => {
                    const weekArea = week.areaStats.find(a => a.area === areaName);
                    const percent = weekArea ? parseFloat(weekArea.completionPercentage) : 0;
                    html += `<div class="division-value">${weekArea ? weekArea.completionPercentage + "%" : "N/A"}<div class="progress-bar"><div class="progress-fill" style="width: ${percent > 100 ? 100 : percent}%"></div></div></div>`;
                });
                
                html += '</div>';
            });
            
            container.innerHTML = html;
        }

        // Render user engagement across all weeks
        function renderUserEngagement() {
            const container = document.getElementById("userEngagement");
            let html = "";
            
            COMPARISON_DATA.weeks.forEach((week, index) => {
                const prevWeek = index > 0 ? COMPARISON_DATA.weeks[index - 1].userEngagement : null;
                const current = week.userEngagement;
                
                const workersGrowth = prevWeek && prevWeek.workers > 0 ? ((current.workers - prevWeek.workers) / prevWeek.workers * 100).toFixed(1) : null;
                const managersGrowth = prevWeek && prevWeek.managers > 0 ? ((current.managers - prevWeek.managers) / prevWeek.managers * 100).toFixed(1) : null;
                const totalUsersGrowth = prevWeek && prevWeek.totalUsers > 0 ? ((current.totalUsers - prevWeek.totalUsers) / prevWeek.totalUsers * 100).toFixed(1) : null;
                const actionsGrowth = prevWeek && prevWeek.totalActions > 0 ? ((current.totalActions - prevWeek.totalActions) / prevWeek.totalActions * 100).toFixed(1) : null;
                
                html += `<div class="engagement-card">
                    <div class="engagement-header">${week.label} (${week.date})</div>
                    <div class="engagement-metrics">
                        <div class="engagement-metric">
                            <div class="engagement-metric-label">
                                <strong>📊 Total Actions</strong>
                                ${actionsGrowth !== null ? `<div class="growth-badge">${actionsGrowth >= 0 ? '+' : ''}${actionsGrowth}%</div>` : ''}
                            </div>
                            <div class="engagement-metric-value">${(current.totalActions / 1000000).toFixed(2)}M</div>
                        </div>
                        <div class="engagement-metric">
                            <div class="engagement-metric-label">
                                Associates
                                ${workersGrowth !== null ? `<div class="growth-badge">${workersGrowth >= 0 ? '+' : ''}${workersGrowth}%</div>` : ''}
                            </div>
                            <div class="engagement-metric-value">${current.workers.toLocaleString()}</div>
                        </div>
                        <div class="engagement-metric">
                            <div class="engagement-metric-label">
                                Managers
                                ${managersGrowth !== null ? `<div class="growth-badge">${managersGrowth >= 0 ? '+' : ''}${managersGrowth}%</div>` : ''}
                            </div>
                            <div class="engagement-metric-value">${current.managers.toLocaleString()}</div>
                        </div>
                        <div class="engagement-metric">
                            <div class="engagement-metric-label">
                                Total Users
                                ${totalUsersGrowth !== null ? `<div class="growth-badge">${totalUsersGrowth >= 0 ? '+' : ''}${totalUsersGrowth}%</div>` : ''}
                            </div>
                            <div class="engagement-metric-value">${current.totalUsers.toLocaleString()}</div>
                        </div>
                    </div>
                </div>`;
            });
            
            container.innerHTML = html;
        }

        // Initialize dashboard
        renderTrendChart();
        renderInsights();
        renderFormatComparison();
        renderDivisionComparison();
        renderAreaComparison();
        renderUserEngagement();
        
        console.log("✅ Store Refresh 8-Week Comparison Dashboard loaded successfully");
    </script>
