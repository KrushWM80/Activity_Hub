        /* CSS Custom Properties for Theme Support */
        :root {
            /* Dark mode (default) */

            --bg-section: rgba(255,255,255,0.05);
            --bg-card: rgba(0,0,0,0.2);
            --bg-week-column: linear-gradient(180deg, rgba(0,212,255,0.15) 0%, rgba(0,255,136,0.05) 100%);
            --bg-header-row: rgba(0,212,255,0.1);
            --bg-highlight: rgba(0, 212, 255, 0.1);
            --bg-format-week: rgba(255,255,255,0.05);
            --bg-growth-badge: rgba(0, 255, 136, 0.2);
            --bg-progress-bar: rgba(255,255,255,0.1);
            
            --text-primary: #fff;
            --text-secondary: rgba(255,255,255,0.8);
            --text-muted: rgba(255,255,255,0.7);
            --text-accent: #00d4ff;
            --text-success: #00ff88;
            
            --border-color: rgba(255,255,255,0.1);
            --border-accent: rgba(0, 212, 255, 0.3);
            
            --gradient-accent: linear-gradient(135deg, #00d4ff, #00ff88);
            --gradient-progress: linear-gradient(90deg, #00d4ff, #00ff88);
        }
        
        /* Light mode overrides */
        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
                --bg-section: rgba(255,255,255,0.95);
                --bg-card: rgba(0,0,0,0.03);
                --bg-week-column: linear-gradient(180deg, rgba(0,113,206,0.08) 0%, rgba(0,76,151,0.03) 100%);
                --bg-header-row: rgba(0,113,206,0.1);
                --bg-highlight: rgba(0, 113, 206, 0.08);
                --bg-format-week: rgba(0,0,0,0.03);
                --bg-growth-badge: rgba(0, 150, 64, 0.15);
                --bg-progress-bar: rgba(0,0,0,0.1);
                
                --text-primary: #1a1a2e;
                --text-secondary: #333;
                --text-muted: #666;
                --text-accent: #0071CE;
                --text-success: #009640;
                
                --border-color: rgba(0,0,0,0.1);
                --border-accent: rgba(0, 113, 206, 0.3);
                
                --gradient-accent: linear-gradient(135deg, #0071CE, #004C97);
                --gradient-progress: linear-gradient(90deg, #0071CE, #009640);
            }
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px;
            background: var(--bg-section);
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            font-size: 1.2rem;
            color: var(--text-muted);
        }
        
        .section {
            background: var(--bg-section);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--border-accent);
            color: var(--text-accent);
        }
        
        #trendChart {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        .week-column {
            background: var(--bg-week-column);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid var(--border-accent);
        }
        
        .week-column-header {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 3px;
        }
        
        .week-column-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        
        .trend-percent {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .week-metrics {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        
        .metric-item {
            text-align: center;
        }
        
        .metric-item-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .metric-item-label {
            font-size: 0.65rem;
            color: var(--text-muted);
        }
        
        .week-change {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }
        
        .change-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-success);
        }
        
        .change-label {
            font-size: 0.65rem;
            color: var(--text-muted);
        }
        
        /* Division comparison */
        .division-row {
            display: grid;
            grid-template-columns: 1.2fr repeat(7, 0.8fr);
            gap: 8px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            align-items: center;
            font-size: 0.9rem;
        }
        
        .division-row.header {
            font-weight: 600;
            background: var(--bg-header-row);
            padding: 15px 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        
        .division-name {
            font-weight: 500;
            padding-left: 10px;
        }
        
        .division-value {
            text-align: center;
            font-size: 0.85rem;
        }
        
        .progress-bar {
            height: 4px;
            background: var(--bg-progress-bar);
            border-radius: 2px;
            margin-top: 5px;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--gradient-progress);
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        
        /* Format cards */
        #formatComparison {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .format-card {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .format-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-accent);
        }
        
        .format-weeks {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .format-week {
            display: flex;
            justify-content: space-between;
            padding: 8px 15px;
            background: var(--bg-format-week);
            border-radius: 8px;
        }
        
        /* User Engagement Grid */
        #userEngagement {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        #userEngagement.row-2 {
            grid-template-columns: repeat(3, 1fr);
        }
        
        .engagement-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
        }
        
        .engagement-header {
            font-weight: 600;
            text-align: center;
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-accent);
        }
        
        .engagement-metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 0.9rem;
        }
        
        .engagement-metric.highlight {
            background: var(--bg-highlight);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
        }
        
        .metric-value-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .metric-value {
            font-weight: 600;
            color: var(--text-success);
        }
        
        .metric-value.large {
            font-size: 1.3rem;
        }
        
        .growth-badge {
            background: var(--bg-growth-badge);
            color: var(--text-success);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        /* Insights */
        .insights-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--text-accent);
        }
        
        .insight-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .insight-icon {
            color: var(--text-success);
            font-weight: bold;
        }
        
        .insight-text {
            flex: 1;
            line-height: 1.5;
        }
        
        /* Responsive */
        @media (max-width: 1600px) {
            #trendChart {
                grid-template-columns: repeat(7, 1fr);
            }
        }
        @media (max-width: 1200px) {
            #trendChart {
                grid-template-columns: repeat(4, 1fr);
            }
            #userEngagement {
                grid-template-columns: repeat(3, 1fr);
            }
            .division-row {
                grid-template-columns: 2fr repeat(7, 1fr);
                font-size: 0.85rem;
            }
        }
        
        @media (max-width: 768px) {
            #trendChart {
                grid-template-columns: repeat(2, 1fr);
            }
            #userEngagement {
                grid-template-columns: 1fr;
            }
            #formatComparison {
                grid-template-columns: 1fr;
            }
            .division-row {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .division-row > div {
                padding: 5px 0;
            }
        }
    </style>
</head>

    // Render unified trend chart - first row (weeks 1-4)
    function renderTrendChart() {
        const container = document.getElementById("trendChart");
        
        COMPARISON_DATA.weeks.forEach((week, index) => {
            const prevWeek = index > 0 ? COMPARISON_DATA.weeks[index - 1] : null;
            const completion = parseFloat(week.summary.overallCompletionOfMax);
            const prevCompletion = prevWeek ? parseFloat(prevWeek.summary.overallCompletionOfMax) : 0;
            const change = prevWeek ? (completion - prevCompletion).toFixed(1) : completion.toFixed(1);
            const isWeek1 = index === 0;
            
            const column = document.createElement("div");
            column.className = "week-column";
            
            let changeHTML = "";
            if (isWeek1) {
                changeHTML = '<div class="week-change"><div class="change-value">+' + change + '%</div><div class="change-label">from 1/3/26</div></div>';
            } else {
                changeHTML = '<div class="week-change"><div class="change-value">' + (change >= 0 ? '+' : '') + change + '%</div><div class="change-label">vs Previous Week</div></div>';
            }
            
            column.innerHTML = 
                '<div class="week-column-header">' + week.label + '</div>' +
                '<div class="week-column-date">' + week.date + '</div>' +
                '<div class="trend-percent">' + week.summary.overallCompletionOfMax + '%</div>' +
                '<div class="week-metrics">' +
                '<div class="metric-item"><div class="metric-item-value">' + (week.summary.totalCompletedItems / 1000).toFixed(0) + 'k</div><div class="metric-item-label">Completed</div></div>' +
                '<div class="metric-item"><div class="metric-item-value">' + (week.summary.storesWithAssignments / 1000).toFixed(1) + 'k</div><div class="metric-item-label">Stores Active</div></div>' +
                '</div>' +
                changeHTML +
                '</div>';
            
            container.appendChild(column);
        });
        
        // Add blank week 8 placeholder
        const blankColumn = document.createElement("div");
        blankColumn.className = "week-column";
        blankColumn.style.opacity = "0.3";
        blankColumn.innerHTML = '<div class="week-column-header">Week 8</div><div class="week-column-date" style="height: 80px; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">Coming Soon</div>';
        container.appendChild(blankColumn);
    }
    
    // Generate insights
    function renderInsights() {
        const container = document.getElementById("insights");
        const weeks = COMPARISON_DATA.weeks;
        
        // Calculate week-by-week changes
        const changes = [];
        for (let i = 1; i < weeks.length; i++) {
            const change = (parseFloat(weeks[i].summary.overallCompletionOfMax) - parseFloat(weeks[i-1].summary.overallCompletionOfMax)).toFixed(1);
            changes.push({
                week: i + 1,
                change: change,
                completion: weeks[i].summary.overallCompletionOfMax
            });
        }
        
        const itemsCompleted = weeks[6].summary.totalCompletedItems - weeks[0].summary.totalCompletedItems;
        const totalChange = (parseFloat(weeks[6].summary.overallCompletionOfMax) - parseFloat(weeks[0].summary.overallCompletionOfMax)).toFixed(1);
        
        const insights = [
            "<strong>Week 7 Progress:</strong> Achieved " + changes[5].change + "% change (" + changes[5].completion + "% completion)",
            "<strong>Week 6 Progress:</strong> Achieved " + changes[4].change + "% change (" + changes[4].completion + "% completion)",
            "<strong>Week 5 Progress:</strong> Achieved " + changes[3].change + "% change (" + changes[3].completion + "% completion)",
            "<strong>Week 4 Progress:</strong> Achieved " + changes[2].change + "% change (" + changes[2].completion + "% completion)",
            "<strong>Week 3 Progress:</strong> Achieved " + changes[1].change + "% change (" + changes[1].completion + "% completion)",
            "<strong>Week 2 Progress:</strong> Achieved " + changes[0].change + "% change (" + changes[0].completion + "% completion)",
            "<strong>Items Completed:</strong> " + itemsCompleted.toLocaleString() + " additional questions completed since Week 1",
            "<strong>Current Status:</strong> " + weeks[6].summary.totalCompletedItems.toLocaleString() + " of " + weeks[6].summary.totalPossibleItems.toLocaleString() + " total questions completed",
            "<strong>Stores Active:</strong> " + weeks[6].summary.storesWithAssignments + " of " + weeks[6].summary.totalStores + " stores have assignments (" + (weeks[6].summary.storesWithAssignments/weeks[6].summary.totalStores*100).toFixed(1) + "%)"
        ];
        
        let html = '<div class="insights-title">📈 Key Insights</div>';
        insights.forEach(insight => {
            html += '<div class="insight-item"><span class="insight-icon">✓</span><span class="insight-text">' + insight + '</span></div>';
        });
        container.innerHTML = html;
    }
    
    // Render division comparison
    function renderDivisionComparison() {
        const container = document.getElementById("divisionComparison");
        
        const divisions = new Set();
        COMPARISON_DATA.weeks.forEach(week => {
            week.divisionStats.forEach(div => divisions.add(div.divisionId));
        });
        
        let headerHTML = '<div class="division-row header"><div>Division</div>';
        COMPARISON_DATA.weeks.forEach(week => {
            headerHTML += '<div>Week ' + week.week + '</div>';
        });
        headerHTML += '</div>';
        
        let html = headerHTML;
        
        Array.from(divisions).sort().forEach(divisionId => {
            html += '<div class="division-row"><div class="division-name">' + divisionId + '</div>';
            
            COMPARISON_DATA.weeks.forEach(week => {
                const weekDiv = week.divisionStats.find(d => d.divisionId === divisionId);
                html += '<div class="division-value">' + (weekDiv ? weekDiv.completionPercentage + "%" : "N/A") + 
                    '<div class="progress-bar"><div class="progress-fill" style="width: ' + (weekDiv ? weekDiv.completionPercentage : 0) + '%"></div></div></div>';
            });
            
            html += '</div>';
        });
        
        container.innerHTML = html;
    }
    
    // Render format comparison
    function renderFormatComparison() {
        const container = document.getElementById("formatComparison");
        
        const formats = ["SC", "NHM", "DIV1"];
        
        formats.forEach(format => {
            const card = document.createElement("div");
            card.className = "format-card";
            
            let html = '<div class="format-name">' + format + '</div><div class="format-weeks">';
            
            COMPARISON_DATA.weeks.forEach(week => {
                const formatData = week.formatStats.find(f => f.format === format);
                html += '<div class="format-week"><span>' + week.label + '</span><strong>' + (formatData ? formatData.completionPercentage + "%" : "N/A") + '</strong></div>';
            });
            
            html += '</div>';
            card.innerHTML = html;
            container.appendChild(card);
        });
    }
    
    // Render area comparison
    function renderAreaComparison() {
        const container = document.getElementById("areaComparison");
        
        // Get all unique areas from all weeks
        const areas = new Set();
        COMPARISON_DATA.weeks.forEach(week => {
            if (week.areaStats) {
                week.areaStats.forEach(area => areas.add(area.area));
            }
        });
        
        let headerHTML = '<div class="division-row header"><div>Area</div>';
        COMPARISON_DATA.weeks.forEach(week => {
            headerHTML += '<div>Week ' + week.week + '</div>';
        });
        headerHTML += '</div>';
        
        let html = headerHTML;
        
        Array.from(areas).sort().forEach(areaName => {
            html += '<div class="division-row"><div class="division-name">' + areaName + '</div>';
            
            COMPARISON_DATA.weeks.forEach(week => {
                const weekArea = week.areaStats ? week.areaStats.find(a => a.area === areaName) : null;
                html += '<div class="division-value">' + (weekArea ? weekArea.completionPercentage + "%" : "N/A") + 
                    '<div class="progress-bar"><div class="progress-fill" style="width: ' + (weekArea ? parseFloat(weekArea.completionPercentage) : 0) + '%"></div></div></div>';
            });
            
            html += '</div>';
        });
        
        container.innerHTML = html;
    }
    
    // Render user engagement - first row (weeks 1-4)
    function renderUserEngagement() {
        const container = document.getElementById("userEngagement");
        let html = "";
        
        COMPARISON_DATA.weeks.forEach((week, index) => {
            const prevWeek = index > 0 ? COMPARISON_DATA.weeks[index - 1].userEngagement : null;
            const current = week.userEngagement;
            
            const workersGrowth = prevWeek && prevWeek.workers > 0 ? ((current.workers - prevWeek.workers) / prevWeek.workers * 100).toFixed(1) : null;
            const managersGrowth = prevWeek && prevWeek.managers > 0 ? ((current.managers - prevWeek.managers) / prevWeek.managers * 100).toFixed(1) : null;
            const totalUsersGrowth = prevWeek && prevWeek.totalUsers > 0 ? ((current.totalUsers - prevWeek.totalUsers) / prevWeek.totalUsers * 100).toFixed(1) : null;
            const assignmentsGrowth = prevWeek && prevWeek.assignments > 0 ? ((current.assignments - prevWeek.assignments) / prevWeek.assignments * 100).toFixed(1) : null;
            const completionsGrowth = prevWeek && prevWeek.completions > 0 ? ((current.completions - prevWeek.completions) / prevWeek.completions * 100).toFixed(1) : null;
            const totalActionsGrowth = prevWeek && prevWeek.totalActions > 0 ? ((current.totalActions - prevWeek.totalActions) / prevWeek.totalActions * 100).toFixed(1) : null;
            
            html += "<div class=\"engagement-card\">" +
                "<div class=\"engagement-header\">" + week.label + " (" + week.date + ")</div>" +
                "<div class=\"engagement-metric highlight\">" +
                "<div class=\"metric-label\"><strong>📊 Total Actions</strong></div>" +
                "<div class=\"metric-value-wrapper\">" + 
                (totalActionsGrowth !== null ? "<div class=\"growth-badge\">" + (totalActionsGrowth >= 0 ? '+' : '') + totalActionsGrowth + "%</div>" : "") + 
                "<div class=\"metric-value large\">" + (current.totalActions / 1000000).toFixed(2) + "M</div></div>" +
                "</div>" +
                "<div class=\"engagement-metric\">" +
                "<div class=\"metric-label\">Associates</div>" +
                "<div class=\"metric-value-wrapper\">" + 
                (workersGrowth !== null ? "<div class=\"growth-badge\">" + (workersGrowth >= 0 ? '+' : '') + workersGrowth + "%</div>" : "") + 
                "<div class=\"metric-value\">" + current.workers.toLocaleString() + "</div></div>" +
                "</div>" +
                "<div class=\"engagement-metric\">" +
                "<div class=\"metric-label\">Managers</div>" +
                "<div class=\"metric-value-wrapper\">" + 
                (managersGrowth !== null ? "<div class=\"growth-badge\">" + (managersGrowth >= 0 ? '+' : '') + managersGrowth + "%</div>" : "") + 
                "<div class=\"metric-value\">" + current.managers.toLocaleString() + "</div></div>" +
                "</div>" +
                "<div class=\"engagement-metric\">" +
                "<div class=\"metric-label\">Total Users</div>" +
                "<div class=\"metric-value-wrapper\">" + 
                (totalUsersGrowth !== null ? "<div class=\"growth-badge\">" + (totalUsersGrowth >= 0 ? '+' : '') + totalUsersGrowth + "%</div>" : "") + 
                "<div class=\"metric-value\">" + current.totalUsers.toLocaleString() + "</div></div>" +
                "</div>" +
                "</div>";
        });
        
        // Add blank week 8 placeholder
        html += "<div class=\"engagement-card\" style=\"opacity: 0.3;\">" +
            "<div class=\"engagement-header\">Week 8</div>" +
            "<div class=\"engagement-metric\" style=\"text-align: center; color: var(--text-muted);\">Coming Soon</div>" +
            "</div>";
        
        container.innerHTML = html;
    }
    
    // Initialize dashboard
    renderTrendChart();
    renderInsights();
    renderDivisionComparison();
    renderFormatComparison();
    renderAreaComparison();
    renderUserEngagement();
    
    console.log("✅ 7-Week Comparison Dashboard loaded successfully");
    </script>
</body>
</html>
