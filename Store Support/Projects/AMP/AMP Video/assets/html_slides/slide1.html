<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background: linear-gradient(45deg, #004c91, #0066cc);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: #ffc220;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            color: #004c91;
            font-weight: bold;
        }
        h1 {
            font-size: 56px;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 28px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div>
        <div class="logo">★</div>
        <h1>AMP Update</h1>
        <div class="subtitle">Week 41 - Store Safety & Security</div>
    </div>
</body>
</html>
