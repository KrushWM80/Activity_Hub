<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background: linear-gradient(45deg, #004c91, #0066cc);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .logo {
            width: 100px;
            height: 100px;
            background: #ffc220;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #004c91;
            font-weight: bold;
        }
        h2 {
            font-size: 48px;
            margin: 0 0 40px 0;
        }
        .cta-button {
            background: #ffc220;
            color: #333;
            padding: 20px 50px;
            border-radius: 15px;
            font-size: 28px;
            font-weight: bold;
            display: inline-block;
            text-decoration: none;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
        .deadline {
            margin-top: 20px;
            font-size: 20px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div>
        <div class="logo">★</div>
        <h2>View Full Details</h2>
        <div class="cta-button">Check Your AMP Dashboard</div>
        <div class="deadline">Deadline: End of Week 41, 2026</div>
    </div>
</body>
</html>
