<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background: linear-gradient(45deg, #f8f9fa, #ffffff);
            color: #333;
            font-family: 'Arial', sans-serif;
            padding: 60px;
            height: calc(100vh - 120px);
            margin: 0;
            display: flex;
            align-items: center;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h2 {
            color: #004c91;
            font-size: 48px;
            margin-bottom: 50px;
            text-align: center;
        }
        .action-item {
            background: #ffc220;
            padding: 25px 30px;
            margin: 20px 0;
            border-radius: 12px;
            font-size: 32px;
            font-weight: 500;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .priority-badge {
            background: #dc3545;
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            display: inline-block;
            margin-top: 30px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Key Actions This Week</h2>
        <div class="action-item">✓ Review safety checklist with all team members</div>
        <div class="action-item">✓ Implement new security protocols by end of week</div>
        <div class="priority-badge">Priority: HIGH</div>
    </div>
</body>
</html>
